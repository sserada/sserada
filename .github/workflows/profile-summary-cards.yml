name: Update GitHub Profile

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日UTC 0時に実行
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  summary-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Keep only dracula theme
        run: |
          cd profile-summary-card-output
          # dracula以外のテーマディレクトリを削除
          find . -maxdepth 1 -type d ! -name dracula ! -name . -exec rm -rf {} +
          # READMEも削除
          rm -f README.md

      - name: Update recent projects in README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直近1ヶ月に更新されたパブリックリポジトリを取得（フォーク・プロフィールリポジトリ除外）
          ONE_MONTH_AGO=$(date -d '1 month ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-1m +%Y-%m-%dT%H:%M:%SZ)
          TABLE=$(gh api "users/${{ github.repository_owner }}/repos?sort=updated&per_page=30&type=owner" \
            | jq -r --arg since "$ONE_MONTH_AGO" --arg owner "${{ github.repository_owner }}" \
            '[.[] | select(.fork == false and .private == false and .name != $owner and .name != "dotfiles" and .name != "sdpbl3-tex" and .updated_at > $since)] | .[] |
            "- [\(.name)](\(.html_url)) — \(.description // "-") (Last update: \(.updated_at | split("T")[0]))"')

          # README内のマーカー間を置換
          awk -v table="$TABLE" '
            /<!-- RECENT-PROJECTS:START -->/ { print; printf "%s\n", table; skip=1; next }
            /<!-- RECENT-PROJECTS:END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Generate streak stats SVG
        run: |
          curl -s -o profile-summary-card-output/streak-stats.svg \
            "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&theme=dracula&hide_border=true&type=svg"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile-summary-card-output README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GitHub profile summary cards"
          git push
