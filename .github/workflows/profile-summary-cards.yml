name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日UTC 0時に実行
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  summary-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Keep only apprentice theme
        run: |
          cd profile-summary-card-output
          # apprentice以外のテーマディレクトリを削除
          find . -maxdepth 1 -type d ! -name apprentice ! -name . -exec rm -rf {} +
          # READMEも削除
          rm -f README.md

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile-summary-card-output
          git diff --quiet && git diff --staged --quiet || git commit -m "Update GitHub profile summary cards"
          git push
